
    <div class="background-container">
        <img src="assets/IMG/fondoregistro.png" alt="Fondo decorativo" class="background-image" />
    </div>
    
    <div class="password-recovery-container">
        <div class="password-recovery">
            <h2>Restablecer Contraseña</h2>
            
            <!-- Mostrar error si el token es inválido -->
            <div class="error-message">
                <p>Token inválido o expirado</p>
                <a href="/usuarios/recovery" class="login-link">Solicitar nuevo enlace</a>
            </div>
            
            <!-- Mostrar formulario si el token es válido -->
            <div>
                <p class="description">Ingresa tu nueva contraseña a continuación.</p>
                
                <form id="passwordResetForm">
                    <input type="hidden" id="token" />
                    
                    <div class="form-group">
                        <label for="newPassword">Nueva contraseña</label>
                        <div class="password-input">
                            <input type="password" id="newPassword" name="newPassword" required placeholder="Mínimo 6 caracteres">
                            <i class="toggle-password fas fa-eye" onclick="togglePasswordVisibility('newPassword')"></i>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strength-bar-1"></div>
                            <div class="strength-bar" id="strength-bar-2"></div>
                            <div class="strength-bar" id="strength-bar-3"></div>
                            <div class="strength-bar" id="strength-bar-4"></div>
                        </div>
                        <p id="password-strength-text">Seguridad: <span id="strength-text">Débil</span></p>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar nueva contraseña</label>
                        <div class="password-input">
                            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repite tu contraseña">
                            <i class="toggle-password fas fa-eye" onclick="togglePasswordVisibility('confirmPassword')"></i>
                        </div>
                        <p id="password-match-message"></p>
                    </div>
                    
                    <button type="submit" id="submitBtn" disabled>Restablecer contraseña</button>
                </form>
                
                <div id="message" class="message"></div>
            </div>
        </div>
    </div>
