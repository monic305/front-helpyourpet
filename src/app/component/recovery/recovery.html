

	<div class="background-container">
		<img src="assets/IMG/fondoregistro.png" alt="Fondo decorativo" class="background-image" />
	</div>
	<div class="password-recovery">
		<h2>Recuperar Contraseña</h2>
		<p class="description">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
		</p>

		<form id="recoveryForm">
			<div class="form-group">
				<label for="email">Correo Electrónico:</label>
				<input type="email" id="email" name="email" required placeholder="tu@email.com">
			</div>

			<button type="submit" id="submitBtn">Enviar Enlace</button>
		</form>

		<div id="message" class="message"></div>
	</div>
