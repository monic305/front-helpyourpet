<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña</title>
    <!-- Fuentes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/CSS/Estilos-recovery.css">
    <link rel="icon" href="assets/IMG/logo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            position: relative;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .password-recovery-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .password-recovery {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(101, 67, 33, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 {
            color: #5D4037; /* Marrón oscuro para armonizar */
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 1.8rem;
        }

        .description {
            color: #795548;
            margin-bottom: 25px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #4E342E;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .password-input {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid #D7CCC8;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            color: #3E2723;
        }

        input[type="password"]:focus, input[type="text"]:focus {
            border-color: #8D6E63;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(141, 110, 99, 0.15);
        }

        input::placeholder {
            color: #BCAAA4;
        }

        /* Estilo moderno para el botón de ver contraseña */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8D6E63;
            z-index: 10;
            transition: color 0.3s;
            font-size: 1.1rem;
        }

        .toggle-password:hover {
            color: #5D4037;
        }

        .password-strength {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            height: 4px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background-color: #EFEBE9;
            border-radius: 2px;
            transition: background-color 0.3s;
        }
        
        #password-strength-text {
            font-size: 0.8rem;
            margin-top: 5px;
            color: #795548;
            text-align: right;
            font-weight: 500;
            min-height: 18px; /* Evita saltos de línea */
        }

        #password-match-message {
            font-size: 0.8rem;
            margin-top: 5px;
            min-height: 18px; /* Evita saltos de línea */
            padding-left: 2px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%); /* Gradiente café */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(93, 64, 55, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(93, 64, 55, 0.3);
            background: linear-gradient(135deg, #A1887F 0%, #6D4C41 100%);
        }
        
        button:disabled {
            background: #D7CCC8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: #9E9E9E;
        }

        .error-message {
            background-color: #FFEBEE;
            color: #C62828;
            border: 1px solid #FFCDD2;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .success-message {
            background-color: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #C8E6C9;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="background-container">
        <img src="assets/IMG/fondoregistro.png" alt="Fondo decorativo" class="background-image" />
    </div>
    
    <div class="password-recovery-container">
        <div class="password-recovery">
            <h2>Restablecer Contraseña</h2>
            
            <!-- Mostrar error si el token es inválido -->
            <div class="error-message">
                <p>Token inválido o expirado</p>
                <a href="/usuarios/recovery" class="login-link">Solicitar nuevo enlace</a>
            </div>
            
            <!-- Mostrar formulario si el token es válido -->
            <div>
                <p class="description">Ingresa tu nueva contraseña a continuación.</p>
                
                <form id="passwordResetForm">
                    <input type="hidden" id="token" />
                    
                    <div class="form-group">
                        <label for="newPassword">Nueva contraseña</label>
                        <div class="password-input">
                            <input type="password" id="newPassword" name="newPassword" required placeholder="Mínimo 6 caracteres">
                            <i class="toggle-password fas fa-eye" onclick="togglePasswordVisibility('newPassword')"></i>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strength-bar-1"></div>
                            <div class="strength-bar" id="strength-bar-2"></div>
                            <div class="strength-bar" id="strength-bar-3"></div>
                            <div class="strength-bar" id="strength-bar-4"></div>
                        </div>
                        <p id="password-strength-text">Seguridad: <span id="strength-text">Débil</span></p>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar nueva contraseña</label>
                        <div class="password-input">
                            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repite tu contraseña">
                            <i class="toggle-password fas fa-eye" onclick="togglePasswordVisibility('confirmPassword')"></i>
                        </div>
                        <p id="password-match-message"></p>
                    </div>
                    
                    <button type="submit" id="submitBtn" disabled>Restablecer contraseña</button>
                </form>
                
                <div id="message" class="message"></div>
            </div>
        </div>
    </div>
    
    <script src="assets/JS/js-recovery-contra.js"></script>
</body>
</html>
