<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login con Visor de Contraseña</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link
		href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fredoka:wght@300..700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="assets/CSS/Estilos-Login.css">
	<link rel="icon" href="assets/IMG/logo.png" type="image/png">
</head>

<body>
	<div class="background-container">
		<img src="assets/IMG/img1.jpeg" alt="Fondo decorativo" class="background-image" />
	</div>

	<div class="login-container">
		<form class="login-form" action="#" method="post">
			<h2>Iniciar Sesión</h2>
			<div class="input-group">
				<label for="correo">Correo</label>
				<input type="email" id="correo" name="correo" placeholder="Ingresa tu correo" required />
			</div>
			<div class="input-group">
				<label for="password">Contraseña</label>
				<div class="password-container">
					<input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required />
					<i class="toggle-password fas fa-eye" onclick="togglePassword()"></i>
				</div>
			</div>

			<button type="submit">Ingresar</button>

			<div class="forgot-password">
				<a href="recovery.html">¿Olvidaste tu contraseña?</a>
			</div>
		</form>

		<div class="registro">¿No tienes cuenta?
			<a href="registro.html">Crea tu cuenta</a>
		</div>
	</div>
</body>
<script src="assets/JS/Scrip-Login.js"></script>

</html>
